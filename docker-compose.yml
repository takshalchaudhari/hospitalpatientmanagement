version: "3.9"

services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DB_PATH: /app/data/hospital.db
    volumes:
      - shmf_data:/app/data
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  shmf_data:
